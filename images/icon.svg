<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="512" height="512">
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#1e1e2e"/>

  <!-- Corner bracket decorations -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="1.5" fill="none" stroke-linecap="square">
    <path d="M 16 32 V 16 H 32"/>
    <path d="M 112 32 V 16 H 96"/>
    <path d="M 16 96 V 112 H 32"/>
    <path d="M 112 96 V 112 H 96"/>
    <line x1="24" y1="84" x2="104" y2="84" stroke-dasharray="2 4" stroke="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Cursor bar (cyan glow) -->
  <rect x="61" y="80" width="6" height="24" rx="1.5" fill="#00e5ff" filter="drop-shadow(0 0 8px rgba(0,229,255,0.4))"/>

  <!-- File document (outline) -->
  <path d="M 42 28 H 74 L 86 40 V 56 H 42 Z" fill="rgba(255,255,255,0.03)" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Fold corner line -->
  <path d="M 74 28 V 40 H 86" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Dashed targeting lines: file corners → cursor -->
  <path d="M 42 56 L 64 80 M 86 56 L 64 80" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="4 4" stroke-linecap="round"/>

  <!-- Anchor dots -->
  <circle cx="42" cy="28" r="5" fill="#ffffff"/>
  <circle cx="42" cy="56" r="5" fill="#ffffff"/>
  <circle cx="86" cy="56" r="5" fill="#ffffff"/>
</svg>
