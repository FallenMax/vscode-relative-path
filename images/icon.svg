<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="512" height="512">
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#1e1e2e"/>

  <!-- File document (left, x=8–54, y=22–106) -->
  <path d="M8,22 L40,22 L54,36 L54,106 L8,106 Z" fill="#313244"/>
  <!-- Fold triangle -->
  <polygon points="40,22 54,22 54,36" fill="#45475a"/>
  <!-- File text lines -->
  <rect x="15" y="46" width="30" height="4" rx="2" fill="#6c7086"/>
  <rect x="15" y="56" width="24" height="4" rx="2" fill="#6c7086"/>
  <rect x="15" y="66" width="28" height="4" rx="2" fill="#6c7086"/>
  <rect x="15" y="76" width="20" height="4" rx="2" fill="#6c7086"/>
  <rect x="15" y="86" width="26" height="4" rx="2" fill="#6c7086"/>

  <!-- Arrow (center, x=58–96, centered at y=64) -->
  <line x1="58" y1="64" x2="84" y2="64" stroke="#cba6f7" stroke-width="5" stroke-linecap="round"/>
  <polygon points="82,56 96,64 82,72" fill="#cba6f7"/>

  <!-- Cursor in text context (right, x=100–122) -->
  <!-- Text line above cursor -->
  <rect x="100" y="36" width="22" height="4" rx="2" fill="#585b70"/>
  <rect x="100" y="46" width="16" height="4" rx="2" fill="#585b70"/>
  <rect x="100" y="56" width="20" height="4" rx="2" fill="#585b70"/>
  <!-- Blinking cursor bar -->
  <rect x="100" y="64" width="4" height="24" rx="2" fill="#89dceb"/>
  <!-- Text lines below cursor -->
  <rect x="100" y="92" width="18" height="4" rx="2" fill="#585b70"/>
  <rect x="100" y="102" width="22" height="4" rx="2" fill="#585b70"/>
  <rect x="100" y="112" width="14" height="4" rx="2" fill="#585b70"/>
</svg>
