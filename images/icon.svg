<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#1e1e2e"/>

  <!-- File document shape -->
  <rect x="22" y="18" width="52" height="64" rx="4" fill="#313244"/>
  <!-- Folded corner -->
  <polygon points="62,18 74,30 62,30" fill="#45475a"/>
  <!-- File lines -->
  <rect x="30" y="40" width="36" height="4" rx="2" fill="#6c7086"/>
  <rect x="30" y="50" width="28" height="4" rx="2" fill="#6c7086"/>
  <rect x="30" y="60" width="32" height="4" rx="2" fill="#6c7086"/>

  <!-- Arrow pointing right into cursor -->
  <path d="M 78 65 L 100 65" stroke="#cba6f7" stroke-width="5" stroke-linecap="round"/>
  <polygon points="100,57 112,65 100,73" fill="#cba6f7"/>

  <!-- Cursor / insertion bar at right -->
  <rect x="108" y="80" width="6" height="28" rx="3" fill="#89dceb"/>
  <!-- Cursor blink line -->
  <rect x="114" y="80" width="4" height="28" rx="1" fill="#89dceb" opacity="0.4"/>
</svg>
